<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCrawl</title>
  <script>
    // Single Page Apps for GitHub Pages
    // https://github.com/rafgraph/spa-github-pages
    // Restore the path from the query string redirect set by 404.html
    (function(l) {
      if (l.search.startsWith('?p=')) {
        // decoded[0] = 'p=<path>', decoded[1] (optional) = 'q=<original query string>'
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(
          null, null,
          l.pathname.slice(0, -1) + (decoded[0] ? '/' + decoded[0].slice(2) : '/') +
          (decoded[1] ? '?' + decoded[1].slice(2) : '') +
          l.hash
        );
      }
    }(window.location));
  </script>
  <script type="module" crossorigin src="/datacrawl.github.io/assets/index-BGGkg91X.js"></script>
  <link rel="stylesheet" crossorigin href="/datacrawl.github.io/assets/index-BWO0MC2C.css">
</head>

</body>
</html>
