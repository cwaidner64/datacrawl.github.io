<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCrawl</title>
  <meta name="description" content="DataCrawl prevents API and webhook failures with validation, drift detection, and automated correction workflows." />
  <meta name="theme-color" content="#111111" />
  <link rel="icon" href="/Logo-basic.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/Logo-basic.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/Logo-basic.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DataCrawl",
      "url": "https://www.datacrawl.org",
      "logo": "https://www.datacrawl.org/Logo-basic.svg"
    }
  </script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var encodedPath = params.get("p");

      if (encodedPath === null) {
        return;
      }

      var basePath = window.location.pathname.replace(/index\.html$/, "");
      if (!basePath.endsWith("/")) {
        basePath += "/";
      }

      var decodedPath = decodeURIComponent(encodedPath).replace(/^\/+/, "");
      var normalizedPath = decodedPath ? basePath + decodedPath : basePath;
      var newUrl = normalizedPath + window.location.hash;

      window.history.replaceState(null, "", newUrl);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
