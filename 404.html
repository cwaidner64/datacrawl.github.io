<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var repoBase = "/";
        var pathname = window.location.pathname;
        var route = pathname.replace(/^\/+/, "");
        var normalizedRoute = route.replace(/^\/+/, "");
        var redirectUrl = repoBase + "?p=" + encodeURIComponent(normalizedRoute) + window.location.hash;

        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
